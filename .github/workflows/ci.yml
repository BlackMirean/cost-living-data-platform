name: CI

on:
  push:
    branches: ["main", "github-public"]
  pull_request:

jobs:
  unit-and-public-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: make test

      - name: Verify public release hygiene
        run: make public-check

  docker-compose-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Docker Compose integration test
        run: make integration

      - name: Upload integration stress output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-integration-results
          path: |
            build/compose-integration-stress.json
            build/compose-integration-worker.json
          if-no-files-found: ignore

  docker-build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f deployment/docker/api.Dockerfile -t cost-living-platform-api:${{ github.sha }} .

      - name: Scan API image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: cost-living-platform-api:${{ github.sha }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  release-artifact:
    runs-on: ubuntu-latest
    needs:
      - unit-and-public-check
      - docker-compose-integration
      - docker-build-and-scan
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Fission package artifact
        run: |
          chmod +x scripts/build_fission_package.sh
          scripts/build_fission_package.sh

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: public-release-artifacts
          path: |
            build/cost-living-platform.zip
            report/source/main.pdf
          if-no-files-found: error
