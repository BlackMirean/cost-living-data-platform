services:
  redis:
    image: redis:7-alpine
    container_name: cost-living-redis
    command: ["redis-server", "--appendonly", "yes", "--dir", "/data", "--appendfilename", "appendonly.aof"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION:-8.17.0}
    container_name: cost-living-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "${ELASTICSEARCH_HOST_PORT:-9200}:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: deployment/docker/api.Dockerfile
    container_name: cost-living-api
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
      RAW_POSTS_INDEX: cost_living_raw_posts
      POSTS_INDEX: cost_living_posts_current
      PROCESSED_POSTS_WRITE_INDEX: cost_living_processed_posts_write
      POSTS_CURRENT_ALIAS: cost_living_posts_current
      INDICATORS_INDEX: cost_living_indicators
      API_RATE_LIMIT_ENABLED: "true"
      OTEL_CONSOLE_EXPORTER_ENABLED: "false"
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  nlp-worker:
    build:
      context: .
      dockerfile: deployment/docker/api.Dockerfile
    container_name: cost-living-nlp-worker
    profiles: ["workers"]
    command: ["python", "-m", "backend.processing.queue_worker"]
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
      RAW_POSTS_INDEX: cost_living_raw_posts
      POSTS_INDEX: cost_living_posts_current
      PROCESSED_POSTS_WRITE_INDEX: cost_living_processed_posts_write
      POSTS_CURRENT_ALIAS: cost_living_posts_current
      NLP_QUEUE_NAME: nlp
      NLP_QUEUE_MAX_ATTEMPTS: "3"
      NLP_QUEUE_DEAD_LETTER_NAME: nlp:dead-letter
      OTEL_CONSOLE_EXPORTER_ENABLED: "false"
    depends_on:
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.elastic.co/kibana/kibana:${ELASTIC_VERSION:-8.17.0}
    container_name: cost-living-kibana
    profiles: ["tools"]
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "${KIBANA_HOST_PORT:-5601}:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  es-data:
  redis-data:
