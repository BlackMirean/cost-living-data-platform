services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION:-8.17.0}
    container_name: cost-living-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: deployment/docker/api.Dockerfile
    container_name: cost-living-api
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      RAW_POSTS_INDEX: cost_living_raw_posts
      POSTS_INDEX: cost_living_posts_current
      INDICATORS_INDEX: cost_living_indicators
    ports:
      - "8000:8000"
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.elastic.co/kibana/kibana:${ELASTIC_VERSION:-8.17.0}
    container_name: cost-living-kibana
    profiles: ["tools"]
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  es-data:
