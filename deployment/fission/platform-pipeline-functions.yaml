apiVersion: fission.io/v1
kind: Function
metadata:
  name: cost-living-platform-bluesky-harvester
  namespace: default
spec:
  environment:
    name: cost-living-platform-python39
    namespace: default
  functionTimeout: 240
  idletimeout: 120
  package:
    functionName: backend.fission_handlers.cost_living_platform_harvest_bluesky
    packageref:
      name: cost-living-platform-pipeline-pkg
      namespace: default
  InvokeStrategy:
    StrategyType: execution
    ExecutionStrategy:
      ExecutorType: poolmgr
      MinScale: 0
      MaxScale: 1
      TargetCPUPercent: 70
      SpecializationTimeout: 120
  requestsPerPod: 1
  configmaps:
    - name: cost-living-platform-config
      namespace: default
  secrets:
    - name: cost-living-platform-secrets
      namespace: default
---
