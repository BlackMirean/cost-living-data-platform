apiVersion: v1
kind: Secret
metadata:
  name: cost-living-platform-secrets
  namespace: default
type: Opaque
stringData:
  ELASTICSEARCH_URL: "https://elasticsearch-es-http.elastic.svc:9200"
  ELASTICSEARCH_USERNAME: "elastic"
  ELASTICSEARCH_PASSWORD: "replace-with-elasticsearch-es-elastic-user-secret"
  ELASTICSEARCH_VERIFY_CERTS: "false"
  BLUESKY_STREAM_HANDLE: "replace-me.bsky.social"
  BLUESKY_STREAM_APP_PASSWORD: "replace-me"
  MASTODON_AU_ACCESS_TOKEN: "replace-me-if-required"
  MASTODON_SOCIAL_ACCESS_TOKEN: "replace-me-if-required"
  AUS_SOCIAL_ACCESS_TOKEN: "replace-me-if-required"
