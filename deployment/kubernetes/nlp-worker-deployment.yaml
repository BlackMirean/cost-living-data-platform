apiVersion: apps/v1
kind: Deployment
metadata:
  name: cost-living-platform-nlp-worker
  namespace: cost-living
spec:
  replicas: 0
  selector:
    matchLabels:
      app: cost-living-platform-nlp-worker
  template:
    metadata:
      labels:
        app: cost-living-platform-nlp-worker
        component: nlp-worker
        project: cost-living
    spec:
      containers:
        - name: nlp-worker
          image: fission/python-env-3.9
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              test -n "${FISSION_PACKAGE_URL}"
              rm -rf /tmp/cost-living-platform-worker
              mkdir -p /tmp/cost-living-platform-worker
              wget -q -O /tmp/cost-living-platform-worker.zip "${FISSION_PACKAGE_URL}"
              unzip -q /tmp/cost-living-platform-worker.zip -d /tmp/cost-living-platform-worker
              export PYTHONPATH=/tmp/cost-living-platform-worker
              exec python -m backend.processing.queue_worker
          envFrom:
            - configMapRef:
                name: cost-living-platform-api-config
            - secretRef:
                name: cost-living-platform-api-secrets
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: cost-living-platform-nlp-worker
  namespace: cost-living
spec:
  scaleTargetRef:
    name: cost-living-platform-nlp-worker
  pollingInterval: 15
  cooldownPeriod: 60
  minReplicaCount: 0
  maxReplicaCount: 3
  triggers:
    - type: redis
      metadata:
        address: redis.redis.svc.cluster.local:6379
        databaseIndex: "0"
        listName: cost_living_pipeline:queue:nlp
        listLength: "1"
