apiVersion: apps/v1
kind: Deployment
metadata:
  name: cost-living-platform-api
  namespace: cost-living
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cost-living-platform-api
  template:
    metadata:
      labels:
        app: cost-living-platform-api
        component: rest-api
        project: cost-living
    spec:
      containers:
        - name: api
          image: ghcr.io/your-username/cost-living-platform-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: cost-living-platform-api-config
            - secretRef:
                name: cost-living-platform-api-secrets
          resources:
            requests:
              cpu: 25m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 10
