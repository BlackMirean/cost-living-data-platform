apiVersion: apps/v1
kind: Deployment
metadata:
  name: cost-living-platform-api
  namespace: cost-living
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cost-living-platform-api
  template:
    metadata:
      labels:
        app: cost-living-platform-api
        component: rest-api
        project: cost-living
    spec:
      containers:
        - name: api
          image: fission/python-env-3.9
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              test -n "${FISSION_PACKAGE_URL}"
              rm -rf /tmp/cost-living-platform-api
              mkdir -p /tmp/cost-living-platform-api
              wget -q -O /tmp/cost-living-platform-api.zip "${FISSION_PACKAGE_URL}"
              unzip -q /tmp/cost-living-platform-api.zip -d /tmp/cost-living-platform-api
              export PYTHONPATH=/tmp/cost-living-platform-api
              exec python -m uvicorn backend.api.main:app --host 0.0.0.0 --port 8000 --workers 1
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: cost-living-platform-api-config
            - secretRef:
                name: cost-living-platform-api-secrets
          resources:
            requests:
              cpu: 25m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 10
